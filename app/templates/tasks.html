{% extends 'base.html' %}
{% block title %} Tasks {% endblock %}

{% block content %}
    <div class="task-box">
        <h2>Your Tasks</h2>
        <form id="taskForm" action="{{ url_for('tasks.add_task') }}" method="post" class="task-form">
            <input type="text" name="title" placeholder="New Task" required>
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        {% if tasks %}
            <form id="clearTasksForm" method="POST" action="{{ url_for('tasks.clear_tasks') }}" class="clear-form">
                <button type="submit" class="btn btn-danger btn-block">Clear All Tasks</button>
            </form>

            <table class="task-table" id="taskTable">
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for task in tasks %}
                        <tr data-task-id="{{ task.id }}">
                            <td>{{ task.title }}</td>
                            <td>
                                <span class="badge {{ task.status|lower }}">{{ task.status }}</span>
                            </td>
                            <td class="task-actions">
                                <button type="button" class="btn btn-secondary action-toggle" data-task-id="{{ task.id }}">Next</button>
                                <button type="button" class="btn btn-danger action-delete" data-task-id="{{ task.id }}">Delete</button>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>

        {% else %}
            <p>No tasks yet, add some tasks first</p>
        {% endif %}
    </div>
{% endblock %}
